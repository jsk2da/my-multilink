<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hazel & Co. — 강아지 그루밍 · 내추럴 케어</title>
  <meta name="description" content="유럽 그루머 자격증 보유 · 가위컷 전문 · 1:1 프라이빗 케어. 강아지가 편안해야 미용도 잘 돼요.">
  <meta property="og:title" content="Hazel & Co.">
  <meta property="og:description" content="유럽 그루머 자격증 보유 · 가위컷 전문 · 1:1 프라이빗 케어">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #F4F0EA;
      --text:    #19150F;
      --muted:   #695E55;
      --subtle:  #A0948A;
      --purple:  #3B2D6D;
      --gold:    #B8946A;
      --gold-lt: #D6C8B8;
    }

    html, body { background: var(--bg); }

    body {
      font-family: 'Pretendard', system-ui, sans-serif;
      font-weight: 300;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── 전체 컨테이너 — 폰 너비 기준 ── */
    .page {
      max-width: 390px;
      margin: 0 auto;
      background: var(--bg);
      min-height: 100dvh;
    }

    /* ══════════════════════════════
       1. HERO PHOTO — square crop
    ══════════════════════════════ */
    .hero {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
    }

    .hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
      display: block;
    }

    /* 하단 그라디언트 — 텍스트 가독성 */
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 30%,
        rgba(0,0,0,.5) 100%
      );
    }

    /* 이름 + 태그라인 — 사진 하단 중앙 */
    .hero-copy {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 28px 24px 32px;
      text-align: center;
      z-index: 1;
    }

    .hero-brand {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 48px;
      letter-spacing: .06em;
      color: #fff;
      line-height: 1;
      display: block;
    }

    .hero-tagline {
      display: block;
      margin-top: 8px;
      font-size: 10px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(255,255,255,.72);
    }

    /* ══════════════════════════════
       2. BOOKING NOTE + SOCIAL — 카키 배경
    ══════════════════════════════ */
    .social-section {
      background: #8B8B65;
      padding: 16px 24px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .booking-note {
      text-align: center;
      font-size: 10px;
      font-weight: 200;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #fff;
    }

    /* ══════════════════════════════
       3. FOLLOW ON SOCIALS
    ══════════════════════════════ */
    .social {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
    }

    .social-label {
      font-size: 9px;
      font-weight: 200;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(255,255,255,.8);
    }

    .social-icons {
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .social-icons a {
      color: rgba(255,255,255,.8);
      display: flex;
      align-items: center;
      transition: color .2s;
    }
    .social-icons a:hover { color: #fff; }

    /* ══════════════════════════════
       4. DIVIDER — "TAKE A LOOK AROUND"
    ══════════════════════════════ */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 28px 24px 22px;
    }

    .section-divider::before,
    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gold-lt);
    }

    .section-divider span {
      font-size: 10px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--subtle);
      white-space: nowrap;
    }

    /* ══════════════════════════════
       5. LINK BUTTONS — 밝은 크림 배경
    ══════════════════════════════ */
    .links {
      background: #FDFAF5;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-btn {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 18px;
      border: 1px solid var(--gold-lt);
      background: transparent;
      text-decoration: none;
      color: var(--text);
      transition: border-color .2s, background .2s;
      min-height: 50px;
    }

    .link-btn:hover {
      border-color: var(--purple);
      background: rgba(59,45,109,.04);
    }

    .link-btn-name {
      font-size: 11px;
      letter-spacing: .16em;
      text-transform: uppercase;
      font-weight: 300;
      color: var(--text);
    }

    .link-btn-arr {
      font-size: 13px;
      color: var(--gold);
    }

    /* ══════════════════════════════
       6. FOOTER
    ══════════════════════════════ */
    .footer {
      padding: 36px 24px 28px;
      text-align: center;
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--subtle);
    }
  </style>
</head>
<body>
<div class="page">

  <!-- 1. HERO PHOTO -->
  <section class="hero">
    <img
      src="assets/images/hero-bio.jpg"
      alt="두 마리의 푸들이 거품 목욕 중 — Hazel &amp; Co."
      class="hero-img"
      width="800"
      height="800"
      loading="eager"
    >
    <div class="hero-overlay"></div>
    <div class="hero-copy">
      <span class="hero-brand">Hazel &amp; Co.</span>
      <span class="hero-tagline">Dog Grooming · Lakeshore, ON</span>
    </div>
  </section>

  <!-- 2+3. BOOKING NOTE + SOCIAL — 카키 배경 -->
  <div class="social-section">
    <p class="booking-note">예약 · 문의 받고 있어요</p>
    <div class="social">
      <p class="social-label">Follow on Socials</p>
      <div class="social-icons">
        <a href="https://www.instagram.com/hazelco_spa" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
          </svg>
        </a>
      </div>
    </div>
  </div>

  <!-- 4. DIVIDER -->
  <div class="section-divider">
    <span>둘러보기</span>
  </div>

  <!-- 5. LINK BUTTONS -->
  <nav class="links" aria-label="주요 링크">

    <a href="booking.html#philosophy" class="link-btn">
      <span class="link-btn-name">예약 안내 보기</span>
      <span class="link-btn-arr">→</span>
    </a>

    <a href="https://ig.me/m/hazelco_spa" class="link-btn" target="_blank" rel="noopener noreferrer">
      <span class="link-btn-name">인스타그램 DM 문의</span>
      <span class="link-btn-arr">→</span>
    </a>

    <a href="https://www.instagram.com/hazelco_spa" class="link-btn" target="_blank" rel="noopener noreferrer">
      <span class="link-btn-name">인스타그램 피드</span>
      <span class="link-btn-arr">→</span>
    </a>

  </nav>

  <!-- 6. FOOTER -->
  <footer class="footer">© Hazel &amp; Co. · Lakeshore, ON</footer>

</div>
</body>
</html>
